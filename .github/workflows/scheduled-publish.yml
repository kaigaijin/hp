name: 予約投稿 — 毎日0時にリビルド

on:
  schedule:
    # JST 0:05 = UTC 15:05（前日）
    - cron: "5 15 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Vercel Deploy Hookでリビルドをトリガー
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
